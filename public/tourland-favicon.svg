<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
  
  <!-- Globe background -->
  <circle cx="50" cy="50" r="45" fill="#f9f9f9"/>
  
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#556B2F" stroke-width="4"/>
  
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="45" ry="30" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.5"/>
  
  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="15" ry="45" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="30" ry="45" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.5"/>
  
  <!-- Pin -->
  <path d="M50 10 C50 10 65 25 65 45 C65 55 58 60 50 60 C42 60 35 55 35 45 C35 25 50 10 50 10 Z" fill="url(#pinGrad)"/>
  <circle cx="50" cy="44" r="8" fill="#fff"/>
  <circle cx="50" cy="44" r="5" fill="#556B2F"/>
</svg>
