<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="50%" stop-color="#e8e8dc"/>
      <stop offset="100%" stop-color="#d4d4c8"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#556B2F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3d5a1e" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#556B2F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#556B2F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d5a1e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Subtle topographic/map contour lines -->
  <g fill="none" stroke="#556B2F" stroke-width="1" opacity="0.06">
    <path d="M0,200 C300,180 500,150 800,200 S1100,250 1400,220 S1700,180 1920,200"/>
    <path d="M0,230 C300,210 500,180 800,230 S1100,280 1400,250 S1700,210 1920,230"/>
    <path d="M0,260 C300,240 500,210 800,260 S1100,310 1400,280 S1700,240 1920,260"/>
    <path d="M0,800 C400,750 700,780 1000,800 S1400,770 1920,800"/>
    <path d="M0,830 C400,780 700,810 1000,830 S1400,800 1920,830"/>
    <path d="M0,860 C400,810 700,840 1000,860 S1400,830 1920,860"/>
  </g>

  <!-- Mountain silhouettes - Sri Lankan tea country -->
  <polygon fill="url(#mountain2)" points="0,700 150,550 250,600 400,480 550,580 700,500 850,600 1000,450 1150,550 1300,480 1450,580 1600,500 1750,580 1920,620 1920,1080 0,1080"/>
  <polygon fill="url(#mountain1)" points="0,750 200,650 350,700 500,580 650,680 800,620 950,700 1100,580 1250,660 1400,600 1600,680 1750,620 1920,700 1920,1080 0,1080"/>

  <!-- Elegant wave overlays -->
  <path fill="url(#wave1)" d="M0,650 C400,500 800,600 1200,550 C1500,510 1700,580 1920,620 L1920,1080 L0,1080Z"/>
  <path fill="url(#wave2)" d="M0,720 C350,620 700,680 1050,650 C1400,620 1600,700 1920,720 L1920,1080 L0,1080Z"/>

  <!-- Decorative dots / abstract travel pattern -->
  <g fill="#556B2F" opacity="0.08">
    <circle cx="150" cy="100" r="3"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="250" cy="90" r="2.5"/>
    <circle cx="1800" cy="150" r="3"/>
    <circle cx="1750" cy="180" r="2"/>
    <circle cx="1700" cy="130" r="2.5"/>
    <circle cx="960" cy="80" r="3"/>
    <circle cx="1000" cy="100" r="2"/>
    <circle cx="920" cy="110" r="2.5"/>
    <circle cx="400" cy="400" r="2"/>
    <circle cx="1500" cy="350" r="2"/>
    <circle cx="700" cy="300" r="2"/>
  </g>

  <!-- Subtle compass rose accent -->
  <g transform="translate(1600, 200)" fill="#556B2F" opacity="0.06">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#556B2F" stroke-width="1"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#556B2F" stroke-width="0.5"/>
    <polygon points="0,-45 -4,-10 0,-20 4,-10"/>
    <polygon points="0,45 -4,10 0,20 4,10"/>
    <polygon points="-45,0 -10,-4 -20,0 -10,4"/>
    <polygon points="45,0 10,-4 20,0 10,4"/>
  </g>

  <!-- Soft gradient overlay for the whole image -->
  <rect width="100%" height="100%" fill="url(#overlay)" opacity="0.3"/>
</svg>
