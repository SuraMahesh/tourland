<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f9f9f9"/>
  <!-- Savannah gradient -->
  <defs>
    <linearGradient id="safari" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8dc"/>
      <stop offset="60%" stop-color="#f5f5ef"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#safari)"/>
  <!-- Sun -->
  <circle cx="480" cy="100" r="50" fill="#556B2F" opacity="0.06"/>
  <circle cx="480" cy="100" r="35" fill="#556B2F" opacity="0.08"/>
  <!-- Tree silhouette (Baobab-like) -->
  <path d="M120 300 Q110 200 100 160 Q95 140 110 145 Q130 150 140 160 Q150 170 145 190 Q140 220 130 300" fill="#556B2F" opacity="0.25"/>
  <!-- Branches -->
  <path d="M105 160 Q130 120 155 145" fill="none" stroke="#556B2F" stroke-width="4" opacity="0.2"/>
  <path d="M125 155 Q160 110 180 130" fill="none" stroke="#556B2F" stroke-width="3" opacity="0.15"/>
  <!-- Leopard silhouette -->
  <path d="M300 290 Q280 270 270 260 Q265 250 280 245 Q295 242 310 248 Q325 255 340 260 Q360 265 370 270 Q385 275 400 280" fill="#556B2F" opacity="0.3"/>
  <!-- Legs -->
  <rect x="295" y="285" width="4" height="15" fill="#556B2F" opacity="0.25"/>
  <rect x="330" y="285" width="4" height="15" fill="#556B2F" opacity="0.25"/>
  <rect x="365" y="282" width="4" height="18" fill="#556B2F" opacity="0.25"/>
  <rect x="395" y="278" width="4" height="18" fill="#556B2F" opacity="0.25"/>
  <!-- Head -->
  <circle cx="285" cy="255" r="10" fill="#556B2F" opacity="0.25"/>
  <!-- Ears -->
  <circle cx="278" cy="250" r="3" fill="#556B2F" opacity="0.2"/>
  <circle cx="292" cy="250" r="3" fill="#556B2F" opacity="0.2"/>
  <!-- Grass -->
  <path d="M0 300 Q50 280 100 300 Q200 285 300 300 Q400 290 500 300 Q550 295 600 300 L600 400 L0 400Z" fill="#556B2F" opacity="0.08"/>
  <!-- Tag -->
  <rect x="20" y="20" width="80" height="28" rx="14" fill="#556B2F"/>
  <text x="60" y="39" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Wildlife</text>
</svg>
