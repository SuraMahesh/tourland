<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f9f9f9"/>
  <!-- Highlands gradient -->
  <defs>
    <linearGradient id="highlands" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8dc"/>
      <stop offset="50%" stop-color="#f5f5ef"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#highlands)"/>
  <!-- Mountains -->
  <path d="M0 280 Q50 200 100 180 Q150 150 200 120 Q250 100 300 80 Q350 100 400 120 Q450 150 500 180 Q550 200 600 220 L600 400 L0 400Z" fill="#556B2F" opacity="0.15"/>
  <path d="M150 300 Q200 220 250 200 Q300 180 350 200 Q400 220 450 240 L450 400 L150 400Z" fill="#556B2F" opacity="0.1"/>
  <!-- Tea rows pattern on hills -->
  <g fill="none" stroke="#556B2F" stroke-width="1" opacity="0.2">
    <path d="M180 200 Q230 180 280 200"/>
    <path d="M160 220 Q210 200 260 220"/>
    <path d="M140 240 Q190 220 240 240"/>
  </g>
  <!-- Tea bushes -->
  <rect x="170" y="180" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <rect x="185" y="178" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <rect x="200" y="182" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <rect x="430" y="200" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <rect x="445" y="198" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <rect x="460" y="202" width="8" height="8" fill="#556B2F" opacity="0.3"/>
  <!-- Waterfall -->
  <path d="M500 150 L500 180 Q500 190 510 200 Q520 210 510 220 Q500 230 500 240" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.25"/>
  <path d="M490 190 L490 210 Q495 220 505 230 Q515 240 505 250" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.2"/>
  <!-- Clouds -->
  <path d="M100 60 Q115 50 130 60 Q145 50 160 60 Q175 55 190 65" fill="#556B2F" opacity="0.1"/>
  <path d="M400 40 Q420 30 440 40 Q460 30 480 40 Q500 35 520 45" fill="#556B2F" opacity="0.1"/>
  <!-- Tag -->
  <rect x="20" y="20" width="80" height="28" rx="14" fill="#556B2F"/>
  <text x="60" y="39" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Highlands</text>
</svg>
