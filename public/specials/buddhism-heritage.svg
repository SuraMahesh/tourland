<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f9f9f9"/>
  <!-- Serene sky -->
  <defs>
    <linearGradient id="temple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8dc"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#temple)"/>
  <!-- Stupa silhouette (Dagoba) -->
  <ellipse cx="300" cy="280" rx="60" ry="20" fill="#556B2F" opacity="0.2"/>
  <path d="M300 180 L240 250 Q300 230 360 250 Z" fill="#556B2F" opacity="0.25"/>
  <circle cx="300" cy="180" r="40" fill="#556B2F" opacity="0.3"/>
  <circle cx="300" cy="180" r="30" fill="#556B2F" opacity="0.35"/>
  <circle cx="300" cy="180" r="20" fill="#556B2F" opacity="0.4"/>
  <circle cx="300" cy="180" r="10" fill="#556B2F" opacity="0.5"/>
  <!-- Temple roofs -->
  <path d="M220 100 L260 70 Q300 60 340 70 L380 100 L340 120 Q300 110 260 120 Z" fill="#556B2F" opacity="0.2"/>
  <path d="M250 120 Q300 100 350 120" fill="none" stroke="#556B2F" stroke-width="3" opacity="0.15"/>
  <!-- Lanterns -->
  <rect x="150" y="300" width="8" height="12" fill="#556B2F" opacity="0.3"/>
  <ellipse cx="154" cy="298" rx="5" ry="3" fill="#556B2F" opacity="0.4"/>
  <rect x="440" y="310" width="8" height="12" fill="#556B2F" opacity="0.3"/>
  <ellipse cx="444" cy="308" rx="5" ry="3" fill="#556B2F" opacity="0.4"/>
  <!-- Spiral smoke (incense) -->
  <path d="M154 290 Q150 280 155 270 Q160 260 155 250" fill="none" stroke="#556B2F" stroke-width="1" opacity="0.2"/>
  <path d="M444 300 Q440 290 445 280 Q450 270 445 260" fill="none" stroke="#556B2F" stroke-width="1" opacity="0.2"/>
  <!-- Trees -->
  <path d="M80 280 Q70 230 60 190 Q50 170 70 175 Q80 180 80 280" fill="#556B2F" opacity="0.15"/>
  <path d="M70 250 Q85 210 95 180 Q105 160 115 165 Q125 170 115 250" fill="#556B2F" opacity="0.15"/>
  <path d="M520 270 Q510 220 500 180 Q490 160 510 165 Q520 170 520 270" fill="#556B2F" opacity="0.15"/>
  <!-- Sacred footprint motif -->
  <path d="M500 50 Q510 70 520 50 Q530 70 520 90 Q510 100 500 90 Q490 100 500 50" fill="#556B2F" opacity="0.1"/>
  <!-- Tag -->
  <rect x="20" y="20" width="80" height="28" rx="14" fill="#556B2F"/>
  <text x="60" y="39" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Culture</text>
</svg>
