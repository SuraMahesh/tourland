<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="grandsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8dc"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grandsky)" opacity="0.2"/>
  <!-- Galle Fort -->
  <g transform="translate(100, 380)">
    <rect x="50" y="50" width="200" height="120" fill="#556B2F" opacity="0.2"/>
    <path d="M50 50 L150 10 L250 50" fill="none" stroke="#556B2F" stroke-width="3" opacity="0.25"/>
    <rect x="80" y="90" width="40" height="80" fill="#556B2F" opacity="0.15"/>
    <rect x="180" y="100" width="30" height="70" fill="#556B2F" opacity="0.15"/>
  </g>
  <!-- Train journey -->
  <g transform="translate(500, 450)">
    <path d="M0,50 Q100,30 200,50 T400,50 T600,50 T800,50" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.3"/>
    <rect x="200" y="40" width="60" height="20" rx="3" fill="#556B2F" opacity="0.4"/>
    <rect x="270" y="35" width="8" height="8" fill="#556B2F" opacity="0.5"/>
  </g>
  <!-- Tea hills with sunrise -->
  <g transform="translate(800, 250)">
    <path d="M0,250 Q50,150 100,180 Q150,100 200,130 Q250,70 300,100 Q350,50 400,80 Q450,40 500,70 Q550,30 600,60" fill="#556B2F" opacity="0.12"/>
    <circle cx="300" cy="80" r="40" fill="#556B2F" opacity="0.08"/>
    <circle cx="300" cy="80" r="60" fill="#556B2F" opacity="0.05"/>
    <circle cx="300" cy="80" r="80" fill="#556B2F" opacity="0.03"/>
  </g>
  <!-- Kandy Temple spire -->
  <g transform="translate(350, 150)">
    <path d="M50 150 L50 20 L80 0 L110 20 L110 150" fill="#556B2F" opacity="0.2"/>
    <ellipse cx="80" cy="150" rx="30" ry="8" fill="#556B2F" opacity="0.1"/>
  </g>
  <!-- Badge -->
  <rect x="20" y="20" width="100" height="36" rx="18" fill="#556B2F" opacity="0.85"/>
  <text x="70" y="47" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">GRAND TOUR</text>
</svg>
