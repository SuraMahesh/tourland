<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8dc"/>
      <stop offset="100%" stop-color="#556B2F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)" opacity="0.15"/>
  <!-- Sigiriya lion rock silhouette -->
  <g transform="translate(200, 100)">
    <path d="M400 450 L350 300 L380 250 L400 200 L420 250 L450 300 Z" fill="#556B2F" opacity="0.25"/>
    <rect x="395" y="200" width="10" height="20" fill="#556B2F" opacity="0.3"/>
    <path d="M450 200 Q460 150 480 120 Q500 90 520 100 Q540 90 560 100 Q580 120 570 150 L460 200Z" fill="#556B2F" opacity="0.2"/>
  </g>
  <!-- Nuwara Eliya tea hills -->
  <g transform="translate(700, 350)">
    <path d="M0,200 Q50,150 100,180 Q150,100 200,130 Q250,80 300,110 Q350,70 400,100 Q450,60 500,90 Q550,50 600,80" fill="#556B2F" opacity="0.15"/>
    <path d="M50,220 Q100,170 150,200 Q200,130 250,160 Q300,120 350,150 Q400,110 450,140 Q500,100 550,130 Q600,100 650,130" fill="#556B2F" opacity="0.12"/>
  </g>
  <!-- Yala elephant silhouette -->
  <g transform="translate(900, 420)">
    <ellipse cx="80" cy="30" rx="60" ry="20" fill="#556B2F" opacity="0.2"/>
    <path d="M50 20 Q40 0 60 -10 Q80 -20 100 -10 Q120 0 110 20" fill="#556B2F" opacity="0.25"/>
    <rect x="60" y="25" width="4" height="15" fill="#556B2F" opacity="0.2"/>
    <rect x="95" y="28" width="4" height="12" fill="#556B2F" opacity="0.2"/>
    <path d="M70 -5 Q75 -20 90 -25 Q105 -20 110 -5" fill="#556B2F" opacity="0.3"/>
    <path d="M110 -5 Q115 10 125 15" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- South coast beach waves -->
  <path d="M0,500 Q100,480 200,500 T400,500 T600,500 T800,500 T1000,500 T1200,500" fill="none" stroke="#556B2F" stroke-width="2" opacity="0.1"/>
  <path d="M0,520 Q150,500 300,520 T600,520 T900,520 T1200,520" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.08"/>
  <!-- Badge -->
  <rect x="20" y="20" width="100" height="36" rx="18" fill="#556B2F" opacity="0.85"/>
  <text x="70" y="47" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">CLASSIC TOUR</text>
</svg>
