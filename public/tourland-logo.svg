<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="globeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#556B2F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
  
  <!-- Globe background -->
  <circle cx="40" cy="40" r="36" fill="url(#globeBg)"/>
  
  <!-- Globe circle -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="#556B2F" stroke-width="3"/>
  
  <!-- Lat/Long lines -->
  <ellipse cx="40" cy="40" rx="36" ry="12" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="40" cy="40" rx="36" ry="24" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="40" cy="40" rx="12" ry="36" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="40" cy="40" rx="24" ry="36" fill="none" stroke="#556B2F" stroke-width="1.5" opacity="0.6"/>
  <line x1="4" y1="40" x2="76" y2="40" stroke="#556B2F" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="4" x2="40" y2="76" stroke="#556B2F" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Mountain silhouette inside globe -->
  <path d="M15 55 L30 30 L38 40 L48 22 L60 45 L68 38 L75 55 Z" fill="#556B2F" opacity="0.3"/>
  
  <!-- Map pin -->
  <path d="M40 5 C40 5 50 20 50 35 C50 40.5 45.5 45 40 45 C34.5 45 30 40.5 30 35 C30 20 40 5 40 5 Z" fill="url(#pinGrad)"/>
  <circle cx="40" cy="34" r="5" fill="#fff"/>
  <circle cx="40" cy="34" r="3" fill="#556B2F"/>
  
  <!-- Brand text -->
  <text x="90" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="300" fill="#000" letter-spacing="2">tourland</text>
  <text x="92" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#556B2F" letter-spacing="6">TRAVEL &amp; EXPLORE</text>
</svg>
